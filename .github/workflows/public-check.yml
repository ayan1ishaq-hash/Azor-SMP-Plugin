name: Public Repo Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify public docs exist
        run: |
          test -f README.md
          test -f LICENSE
          test -f docs/installation.md
          test -f docs/commands.md
          test -f assets/pack.png
