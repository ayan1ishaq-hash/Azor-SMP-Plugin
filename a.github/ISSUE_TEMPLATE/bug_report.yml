name: Bug Report
description: Report a bug with Azor Plugin
title: "[Bug]: "
labels: ["bug"]
body:
  - type: input
    id: plugin-version
    attributes:
      label: Plugin Version
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: Server Version
      placeholder: "Paper 1.21.x"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste error logs if any.
      render: text
