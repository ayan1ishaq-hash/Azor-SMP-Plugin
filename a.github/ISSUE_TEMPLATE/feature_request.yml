name: Feature Request
description: Suggest a feature for Azor Plugin
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: Feature idea
      description: What should be added or changed?
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why should this be added?
    validations:
      required: true
